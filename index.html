<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق صالون بيبا - Salon Biba</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --soft-pink: #fce4ec; --main-pink: #f06292; --dark-pink: #b02a65; 
            --light-bg: #fffbf9; --white: #ffffff;
            --fb-blue: #1877F2; --tk-black: #010101;
        }

        body {
            font-family: 'Tajawal', sans-serif; margin: 0; padding: 0;
            background-color: var(--light-bg); color: #333; scroll-behavior: smooth;
        }

        header {
            background-color: var(--white); text-align: center; padding: 30px 20px;
            box-shadow: 0 4px 15px rgba(240, 98, 146, 0.15); border-bottom: 4px solid var(--main-pink); 
        }

        .logo-container {
            width: 120px; height: 120px; margin: 0 auto; border-radius: 50%;
            border: 3px solid var(--main-pink); overflow: hidden;
            background-image: url('https://c.top4top.io/p_375053pvo0.jpg'); 
            background-size: cover; background-position: center;
        }

        header h1 { margin: 15px 0 5px; font-size: 2.2em; color: var(--dark-pink); }
        header p { margin: 0; color: var(--main-pink); font-weight: 700; }

        .header-social { display: flex; justify-content: center; gap: 20px; margin-top: 20px; }
        .social-circle {
            width: 50px; height: 50px; border-radius: 50%; display: flex;
            align-items: center; justify-content: center; color: white;
            font-size: 1.5em; text-decoration: none; box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            cursor: pointer; transition: 0.3s;
        }
        .fb { background-color: var(--fb-blue); } .tk { background-color: var(--tk-black); }
        .social-circle:hover { transform: scale(1.1); }

        nav {
            background-color: var(--main-pink); display: flex; justify-content: center;
            gap: 15px; padding: 15px 0; position: sticky; top: 0; z-index: 100;
        }
        nav a { color: var(--white); text-decoration: none; font-weight: 700; font-size: 0.9em; }

        .container { padding: 20px; max-width: 900px; margin: 0 auto; }
        .section-title {
            text-align: center; color: var(--dark-pink); margin: 40px 0 20px;
            font-size: 1.6em; border-bottom: 2px solid var(--main-pink);
            display: inline-block; padding-bottom: 5px;
        }

        /* دليل الخدمات */
        .video-guide-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .video-guide-card {
            background: var(--white); border-radius: 15px; overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); border: 1px solid var(--soft-pink);
            cursor: pointer; transition: 0.3s;
        }
        .video-thumbnail {
            width: 100%; height: 180px; background-color: #000;
            display: flex; align-items: center; justify-content: center;
            background-size: cover; background-position: center; position: relative;
        }
        .video-thumbnail::before { content: "\f144"; font-family: "Font Awesome 6 Free"; font-weight: 900; font-size: 45px; color: white; opacity: 0.8; }
        .video-guide-info { padding: 15px; text-align: center; }

        /* نموذج الحجز */
        .booking-section { background-color: var(--white); padding: 25px; border-radius: 15px; border: 1px solid var(--main-pink); margin-top: 40px; }
        .checkbox-container { max-height: 350px; overflow-y: auto; background-color: var(--soft-pink); border-radius: 8px; padding: 15px; margin: 12px 0; text-align: right; }
        .service-group-title { font-weight: bold; color: var(--dark-pink); display: block; margin-top: 15px; border-bottom: 1px solid var(--main-pink); }
        .checkbox-label { display: block; margin-top: 10px; font-size: 0.9em; cursor: pointer; }
        
        input:not([type="checkbox"]), select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid var(--main-pink); border-radius: 8px; font-family: 'Tajawal'; box-sizing: border-box; }
        .btn { background-color: var(--dark-pink); color: var(--white); border: none; padding: 15px; width: 100%; border-radius: 8px; font-size: 1.1em; font-weight: 700; cursor: pointer; }

        footer { background-color: var(--dark-pink); color: var(--white); text-align: center; padding: 40px 20px; margin-top: 50px; }
    </style>
</head>
<body>

    <header>
        <div class="logo-container"></div>
        <h1>Salon Biba</h1>
        <p>إطلالة ملكية بلمسات بيبا السحرية</p>
        <div class="header-social">
            <div onclick="forceExternal('https://www.tiktok.com/@salonbiba')" class="social-circle tk"><i class="fab fa-tiktok"></i></div>
            <div onclick="forceExternal('https://www.facebook.com/dabbahlamia')" class="social-circle fb"><i class="fab fa-facebook-f"></i></div>
        </div>
    </header>

    <nav>
        <a href="#video-guide">دليل الخدمات</a>
        <a href="#booking">حجز موعد</a>
    </nav>

    <div class="container">
        <h2 id="video-guide" class="section-title">دليل خدماتنا المتميز</h2>
        <div class="video-guide-grid">
            <div onclick="forceExternal('https://www.facebook.com/dabbahlamia/videos')" class="video-guide-card">
                <div class="video-thumbnail" style="background-image: url('https://images.unsplash.com/photo-1594462283024-297ecd92ec81?w=500');"></div>
                <div class="video-guide-info"><h4>كراء فساتين الأعراس</h4></div>
            </div>
            <div onclick="forceExternal('https://www.facebook.com/dabbahlamia/videos')" class="video-guide-card">
                <div class="video-thumbnail" style="background-image: url('https://images.unsplash.com/photo-1560066984-138dadb4c035?w=500');"></div>
                <div class="video-guide-info"><h4>حلاقة و تجميل 3D</h4></div>
            </div>
        </div>

        <div class="booking-section" id="booking">
            <h2 style="text-align: center; color: var(--dark-pink);">حجزي موعدكِ الآن</h2>
            <form id="whatsappForm">
                <input type="text" id="name" placeholder="اسم الزبونة الكريمة" required>
                <div class="checkbox-container">
                    <span class="service-group-title">👗 كراء الفساتين:</span>
                    <label class="checkbox-label"><input type="checkbox" name="service" value="فستان زفاف"> فستان زفاف العروسة</label>
                    <label class="checkbox-label"><input type="checkbox" name="service" value="فستان حنة"> فستان الحنة</label>
                    <span class="service-group-title">💇‍♀️ تجميل:</span>
                    <label class="checkbox-label"><input type="checkbox" name="service" value="باقة العروسة"> باقة العروسة (تجهيز كامل)</label>
                    <label class="checkbox-label"><input type="checkbox" name="service" value="حلاقة 3D"> حلاقة الشعر 3D</label>
                </div>
                <input type="datetime-local" id="datetime" required>
                <button type="button" onclick="sendToWhatsApp()" class="btn">تأكيد عبر واتساب</button>
            </form>
        </div>
    </div>

    <footer>
        <p>Salon Biba - الجلفة، حي البرج</p>
        <p>06.69.49.82.18</p>
    </footer>

    <script>
        function forceExternal(url) {
            // حل مشكلة الحظر 404 والـ ERR_BLOCKED
            const newWindow = window.open(url, '_blank');
            if (!newWindow || newWindow.closed || typeof newWindow.closed == 'undefined') {
                window.location.href = url;
            }
        }

        function sendToWhatsApp() {
            const name = document.getElementById('name').value;
            const datetime = document.getElementById('datetime').value;
            const checkboxes = document.querySelectorAll('input[name="service"]:checked');
            let services = [];
            checkboxes.forEach(cb => services.push(cb.value));

            if(!name || services.length === 0 || !datetime) {
                alert("يرجى إكمال البيانات");
                return;
            }

            const msg = `مرحباً Salon Biba، أود حجز موعد:%0A- الاسم: ${name}%0A- الخدمات: ${services.join('، ')}%0A- الموعد: ${datetime}`;
            forceExternal(`https://wa.me/213669498218?text=${msg}`);
        }
    </script>
</body>
</html>
